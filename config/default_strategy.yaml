data_source:
  provider: akshare
  cache_dir: .cache/market_data
  use_cache: true

account:
  provider: json
  position_store_path: data/positions.json

app:
  default_output: text

lookback_days: 365
rebalance_interval: 7
max_positions: 3
max_daily_buys: 3
equal_weight: true
board_ma_window: 250
board_volume_days: 5
board_min_volume: 120
stock_float_cap_max: 1000000000
first_day_gain_pct: 7.0
second_day_open_gap_positive: true
second_day_bullish: true
buy_ma_window: 20
sell_ma_window: 5
hold_days: 5
benchmark_symbol: sh000300
exclude_st: true
board_name_keywords: []
commission_rate: 0.0003
stamp_duty_rate: 0.001
slippage_rate: 0.0005
