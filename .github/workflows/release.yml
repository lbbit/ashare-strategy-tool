name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e .[dev]
      - run: pytest

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e .[dev]
      - name: Build Windows package
        run: python build_windows.py
      - name: Show generated artifacts
        shell: pwsh
        run: |
          Get-ChildItem -Path . -Filter "ashare-strategy-windows-x86_64-*.zip"
          Get-ChildItem -Path dist_release -Recurse
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            .\ashare-strategy-windows-x86_64-*.zip
          body_path: RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
