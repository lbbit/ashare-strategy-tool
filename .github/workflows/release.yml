name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e .[dev]
      - run: pytest

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e .[dev]
      - name: Build Windows package
        run: python build_windows.py
      - name: Show generated artifacts
        shell: pwsh
        run: |
          Get-ChildItem -Path . -Filter "ashare-strategy-windows-x86_64-*.zip" | Format-Table FullName, Length -AutoSize
          Get-ChildItem -Path dist_release -Recurse | Format-Table FullName, Length -AutoSize
      - name: Upload release asset
        shell: pwsh
        run: |
          $asset = Get-ChildItem -Path . -Filter "ashare-strategy-windows-x86_64-*.zip" | Select-Object -First 1
          if (-not $asset) {
            Write-Error "Windows release zip not found"
            exit 1
          }
          gh release upload $env:GITHUB_REF_NAME $asset.FullName --repo $env:GITHUB_REPOSITORY --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
