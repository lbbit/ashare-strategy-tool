name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e .[dev]
      - run: pytest

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e .[dev]
      - name: Build Windows package
        shell: pwsh
        run: |
          python build_windows.py
          $asset = Join-Path $PWD "ashare-strategy-windows-x86_64-${env:GITHUB_REF_NAME}.zip"
          if (-not (Test-Path $asset)) {
            Write-Error "Expected archive not found: $asset"
            exit 1
          }
          "WINDOWS_ASSET=$asset" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Show generated artifacts
        shell: pwsh
        run: |
          Get-ChildItem -Path . -Filter "ashare-strategy-windows-x86_64-*.zip" | Format-Table FullName, Length -AutoSize
          Get-ChildItem -Path dist_release -Recurse | Format-Table FullName, Length -AutoSize
          Write-Host "Resolved asset path: $env:WINDOWS_ASSET"
      - name: Ensure release exists
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload release asset
        shell: pwsh
        run: |
          gh release upload $env:GITHUB_REF_NAME $env:WINDOWS_ASSET --repo $env:GITHUB_REPOSITORY --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
